input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["earthquakes"]
    codec => json { charset => "UTF-8" }
    auto_offset_reset => "earliest"
  }
}

filter {
  mutate {
    remove_field => ["[event][original]", "@version", "event"]
    add_field => { "data_source" => "usgs" }
    rename => { "event_id" => "[@metadata][event_id]" }
  }

  # geo_point from coordinates [lon, lat, depth]
  if [coordinates] and [coordinates][0] and [coordinates][1] {
    mutate {
      add_field => {
        "[location][lon]" => "%{[coordinates][0]}"
        "[location][lat]" => "%{[coordinates][1]}"
      }
    }
    mutate {
      convert => {
        "[location][lon]" => "float"
        "[location][lat]" => "float"
      }
    }
  }

  # set @timestamp from time_iso
  if [time_iso] {
    date {
      match => ["time_iso", "ISO8601"]
      target => "@timestamp"
    }
  }
}

output {
  stdout { codec => rubydebug }

  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "earthquakes"
    document_id => "%{[@metadata][event_id]}"
  }
}
